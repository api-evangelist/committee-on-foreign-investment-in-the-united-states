      - FIRRMA
      - Federal Register
      - Regulations
      - Statutes
    serviceName: CFIUS Regulations and Statutes
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
