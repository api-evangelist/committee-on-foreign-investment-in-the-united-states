name: Committee on Foreign Investment in the United States
kind: government
description: >-
  The Committee on Foreign Investment in the United States (CFIUS) is an
  inter-agency committee chaired by the U.S. Department of the Treasury that
  reviews certain foreign investment transactions for national security
  implications. CFIUS reviews are governed by the Defense Production Act and
  Section 721, and were significantly strengthened by the Foreign Investment
  Risk Review Modernization Act of 2018 (FIRRMA). On September 15, 2022,
  President Biden issued Executive Order 14083 directing CFIUS to focus on
  emerging national security risks. CFIUS work is largely confidential, and
  the public-facing surface is limited to regulations, annual reports to
  Congress, FAQs, declarations and notices guidance, and case studies.
